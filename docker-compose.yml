services:
  db:
    image: mariadb:11
    restart: always
    expose:
      - "3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: agenda_octane
      MARIADB_USER: agenda
      MARIADB_PASSWORD: ${DB_PASSWORD:-agenda123}
    volumes:
      - mariadb_data:/var/lib/mysql

  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
    environment:
      PORT: 4000
      DATABASE_URL: mysql://agenda:${DB_PASSWORD:-agenda123}@db:3306/agenda_octane
      WHATSAPP_API_URL: https://apiwp.octane.com.mx/api/messages/send
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:-}
      WHATSAPP_DEFAULT_COUNTRY_CODE: "52"
      FRONTEND_URL: ${FRONTEND_URL:-https://agenda.octane.com.mx}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
    command: sh -c "npx prisma migrate deploy && node src/index.js"
    volumes:
      - ./backend/prisma:/app/prisma

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8090:8090"
    environment:
      - NODE_ENV=production

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1280

volumes:
  mariadb_data:
