version: '3.9'

services:
  db:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: RootPasswordSecure!2025
      MARIADB_DATABASE: agenda_octane
      MARIADB_USER: agenda
      MARIADB_PASSWORD: S3cur3Ag3nd4P4ss2025!
    # Port 3306 is now internal only - NOT EXPOSED to Internet
    volumes:
      - mariadb_data:/var/lib/mysql

  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
    environment:
      PORT: 4000
      DATABASE_URL: mysql://agenda:S3cur3Ag3nd4P4ss2025!@db:3306/agenda_octane
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-supersecret_secure_key_change_me}
    ports:
      - '4000:4000'
    command: sh -c "npx prisma migrate deploy && node src/index.js"
    volumes:
      - ./backend/prisma:/app/prisma

  frontend:
    build: ./frontend
    restart: always
    network_mode: host
    depends_on:
      - backend

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1280

volumes:
  mariadb_data:
